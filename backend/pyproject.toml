[tool.black]
line-length = 120
target-version = ["py310"]
exclude = '''
/(
    venv
  | migrations
)/
'''

[tool.ruff]
line-length = 120
target-version = "py310"

exclude = [
    "venv",
    "__pycache__",
]

select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # import sorting
    "UP",  # pyupgrade
    "B",   # bugbear
]

fix = true

[tool.ruff.isort]
known-first-party = ["app"]
[project]
name = "backend"
version = "0.1.0"
description = ""
authors = [
    {name = "Alex",email = "iam.alexgarber@protonmail.com"}
]
requires-python = ">=3.13"
dependencies = [
]


[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"
