services:
  postgres:
    image: postgres:18
    container_name: vinyl_postgres
    environment:
      POSTGRES_DB: vinyl_dev
      POSTGRES_USER: vinyl
      POSTGRES_PASSWORD: vinyl
    ports:
      - "5432:5432"
    volumes:
      - postgres_18_data:/var/lib/postgresql
      - ./scripts/postgres/init-databases.sql:/docker-entrypoint-initdb.d/10-init-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vinyl -d vinyl_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  postgres-init:
    image: postgres:18
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: vinyl
    volumes:
      - ./scripts/postgres/init-databases.sql:/docker-entrypoint-initdb.d/10-init-databases.sql:ro
    command:
      [
        "psql",
        "-h",
        "postgres",
        "-U",
        "vinyl",
        "-d",
        "postgres",
        "-f",
        "/docker-entrypoint-initdb.d/10-init-databases.sql",
      ]
    restart: "no"

  redis:
    image: ${REDIS_IMAGE:-redis:7.4-alpine}
    container_name: vinyl_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        POETRY_EXTRAS: ${BACKEND_DOCKER_POETRY_EXTRAS:-}
    container_name: vinyl_backend
    depends_on:
      postgres:
        condition: service_healthy
      postgres-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      DATABASE_PROFILE: ${DATABASE_PROFILE:-dev}
      DATABASE_DEV_URL: postgresql://vinyl:vinyl@postgres:5432/vinyl_dev
      DATABASE_COLLECTION_URL: postgresql://vinyl:vinyl@postgres:5432/vinyl_collection
      DISCOGS_BASE_URL: ${DISCOGS_BASE_URL:-https://api.discogs.com}
      DISCOGS_TOKEN_ENCRYPTION_KEY: ${DISCOGS_TOKEN_ENCRYPTION_KEY:-}
      AUTH_ACCESS_TOKEN_SECRET: ${AUTH_ACCESS_TOKEN_SECRET:-local-dev-access-token-secret-change-before-production-please}
      AUTH_CODE_HASH_SECRET: ${AUTH_CODE_HASH_SECRET:-local-dev-code-hash-secret-change-before-production-please}
      AUTH_EMAIL_DELIVERY_BACKEND: ${AUTH_EMAIL_DELIVERY_BACKEND:-local}
      AUTH_LOCAL_EMAIL_OUTBOX_PATH: ${AUTH_LOCAL_EMAIL_OUTBOX_PATH:-/app/backend/auth-local-email-outbox/auth-local-email-outbox.jsonl}
      AUTH_EMAIL_FROM_ADDRESS: ${AUTH_EMAIL_FROM_ADDRESS:-noreply@vinyl-listen.local}
      MAILGUN_API_BASE_URL: ${MAILGUN_API_BASE_URL:-https://api.mailgun.net}
      MAILGUN_API_KEY: ${MAILGUN_API_KEY:-}
      MAILGUN_DOMAIN: ${MAILGUN_DOMAIN:-}
      AI_CHAT_ENABLED: ${AI_CHAT_ENABLED:-false}
      AI_CHAT_BASE_URL: ${AI_CHAT_BASE_URL:-http://host.docker.internal:1234}
      AI_CHAT_ENDPOINT_PATH: ${AI_CHAT_ENDPOINT_PATH:-/api/v1/chat}
      AI_CHAT_MODEL: ${AI_CHAT_MODEL:-}
      AI_CHAT_API_KEY: ${AI_CHAT_API_KEY:-}
      AI_CHAT_TIMEOUT_SECONDS: ${AI_CHAT_TIMEOUT_SECONDS:-60}
      AI_CHAT_TEMPERATURE: ${AI_CHAT_TEMPERATURE:-0.2}
      API_RATE_LIMIT_PER_MINUTE: ${API_RATE_LIMIT_PER_MINUTE:-60}
      IDENTIFY_OCR_BACKEND: ${IDENTIFY_OCR_BACKEND:-auto}
      IDENTIFY_MLX_VLM_SERVICE_URL: ${IDENTIFY_MLX_VLM_SERVICE_URL:-http://host.docker.internal:8111}
      IDENTIFY_MLX_VLM_ENDPOINT_PATH: ${IDENTIFY_MLX_VLM_ENDPOINT_PATH:-/v1/chat/completions}
      IDENTIFY_MLX_VLM_MODEL_NAME: ${IDENTIFY_MLX_VLM_MODEL_NAME:-PaddlePaddle/PaddleOCR-VL-1.5}
      IDENTIFY_MLX_VLM_API_KEY: ${IDENTIFY_MLX_VLM_API_KEY:-}
      IDENTIFY_MLX_VLM_TIMEOUT_SECONDS: ${IDENTIFY_MLX_VLM_TIMEOUT_SECONDS:-30}
      IDENTIFY_MLX_VLM_MAX_IMAGE_DIMENSION: ${IDENTIFY_MLX_VLM_MAX_IMAGE_DIMENSION:-2048}
      IDENTIFY_MLX_VLM_MAX_TOKENS: ${IDENTIFY_MLX_VLM_MAX_TOKENS:-768}
      IDENTIFY_MLX_VLM_VARIANT_NAMES: ${IDENTIFY_MLX_VLM_VARIANT_NAMES:-normalized,label_catalog_band,label_bottom_band,grayscale,sharpened}
      IDENTIFY_MLX_VLM_MAX_VARIANTS: ${IDENTIFY_MLX_VLM_MAX_VARIANTS:-3}
      IDENTIFY_GEOMETRY_PREPROCESS_ENABLED: ${IDENTIFY_GEOMETRY_PREPROCESS_ENABLED:-false}
      IDENTIFY_DEBUG_PREPROCESS_IMAGES_ENABLED: ${IDENTIFY_DEBUG_PREPROCESS_IMAGES_ENABLED:-false}
      IDENTIFY_DEBUG_PREPROCESS_IMAGES_DIR: ${IDENTIFY_DEBUG_PREPROCESS_IMAGES_DIR:-identify_ocr_images}
      LOG_LEVEL: ${LOG_LEVEL:-}
      PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK: ${PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK:-True}
      INBOUND_RATE_LIMIT_BACKEND: ${INBOUND_RATE_LIMIT_BACKEND:-memory}
      INBOUND_RATE_LIMIT_REDIS_URL: ${INBOUND_RATE_LIMIT_REDIS_URL:-redis://redis:6379/0}
      INBOUND_RATE_LIMIT_REDIS_KEY_PREFIX: ${INBOUND_RATE_LIMIT_REDIS_KEY_PREFIX:-vinyl-listen-app:rate-limit}
      INBOUND_RATE_LIMIT_REDIS_FAIL_OPEN: ${INBOUND_RATE_LIMIT_REDIS_FAIL_OPEN:-true}
      INBOUND_RATE_LIMIT_REDIS_TIMEOUT_SECONDS: ${INBOUND_RATE_LIMIT_REDIS_TIMEOUT_SECONDS:-0.25}
    volumes:
      - ./backend/auth-local-email-outbox:/app/backend/auth-local-email-outbox
      - ./backend/identify_ocr_images:/app/backend/identify_ocr_images
      - ./spotify_import:/app/backend/spotify_import
    ports:
      - "8000:8000"
    command:
      - /bin/sh
      - -c
      - alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --log-level debug --access-log
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health/').read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  postgres_18_data:
